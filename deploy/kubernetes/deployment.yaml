apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-tagger
  namespace: media-tagger
  labels:
    app.kubernetes.io/name: media-tagger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: media-tagger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-tagger
    spec:
      containers:
        - name: media-tagger
          image: ghcr.io/djryanj/media-tagger:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: MEDIA_TAGGER_MAX_UPLOAD_BYTES
              value: "1073741824"
            - name: MEDIA_TAGGER_IN_MEMORY_UPLOAD_LIMIT_BYTES
              value: "536870912"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: temp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              memory: 2Gi
      volumes:
        - name: temp
          emptyDir: {}

name: Docker Build and Release

on:
  workflow_call:
    inputs:
      push:
        description: Push image to registry
        required: false
        default: false
        type: boolean
      platforms:
        description: Target platforms
        required: false
        default: linux/amd64,linux/arm64
        type: string
      dockerfile:
        description: Path to Dockerfile
        required: false
        default: Dockerfile
        type: string
      image-suffix:
        description: Suffix to append to image tags
        required: false
        default: ""
        type: string
    outputs:
      digest:
        description: Image digest
        value: ${{ jobs.build.outputs.digest }}
      tags:
        description: Image tags
        value: ${{ jobs.build.outputs.tags }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-${{ github.ref }}-${{ inputs.dockerfile }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Container Registry
        if: inputs.push
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ inputs.image-suffix }},onlatest=true
          tags: |
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || (github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')) }}

      - name: Get build information
        id: build-info
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi
          echo "commit=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.push && inputs.platforms || 'linux/amd64' }}
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build-info.outputs.version }}
            COMMIT=${{ steps.build-info.outputs.commit }}
            BUILD_TIME=${{ steps.build-info.outputs.build_time }}
          cache-from: |
            type=gha,scope=buildkit-${{ inputs.dockerfile }}-${{ github.ref_name }}
            type=gha,scope=buildkit-${{ inputs.dockerfile }}-main
          cache-to: type=gha,mode=max,scope=buildkit-${{ inputs.dockerfile }}-${{ github.ref_name }}
          provenance: false
          sbom: false

      - name: Smoke test runtime image
        if: ${{ !inputs.push }}
        run: |
          image_ref="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | head -n 1)"
          test -n "$image_ref"
          docker run --rm --entrypoint sh "$image_ref" -lc 'command -v ffmpeg >/dev/null && command -v exiftool >/dev/null'

name: Renovate

on:
    workflow_dispatch:
        inputs:
            dryRun:
                description: 'Dry run mode'
                required: false
                default: 'false'
                type: choice
                options:
                    - 'true'
                    - 'false'
    schedule:
        # Run Monday at 6 AM UTC (matches renovate.json schedule)
        - cron: '0 6 * * 1'
    push:
        branches:
            - main
        paths:
            - '.github/renovate.json'
            - '.github/workflows/renovate.yml'

jobs:
    renovate:
        name: Run Renovate
        runs-on: ubuntu-latest
        permissions:
            contents: write
            issues: write
            pull-requests: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

            - name: Self-hosted Renovate
              uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
              with:
                  configurationFile: .github/renovate.json
                  token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
              env:
                  LOG_LEVEL: ${{ github.event.inputs.dryRun == 'true' && 'debug' || 'info' }}
                  RENOVATE_DRY_RUN: ${{ github.event.inputs.dryRun || 'false' }}
                  RENOVATE_REPOSITORIES: ${{ github.repository }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-tagger
  namespace: media-tagger
  labels:
    app.kubernetes.io/name: media-tagger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: media-tagger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-tagger
    spec:
      containers:
        - name: media-tagger
          image: ghcr.io/djryanj/media-tagger:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: temp
              mountPath: /tmp
      volumes:
        - name: temp
          emptyDir: {}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-tagger
  namespace: media-tagger
  labels:
    app.kubernetes.io/name: media-tagger
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: media-tagger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: media-tagger
    spec:
      automountServiceAccountToken: false
      containers:
        - name: media-tagger
          image: ghcr.io/djryanj/media-tagger:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: MEDIA_TAGGER_MAX_UPLOAD_BYTES
              value: "1073741824" # 1 GiB
            - name: MEDIA_TAGGER_IN_MEMORY_UPLOAD_LIMIT_BYTES
              value: "536870912" # 512 MiB
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "1024Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      restartPolicy: Always
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
